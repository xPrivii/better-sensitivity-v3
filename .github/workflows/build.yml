name: Build PrecisionSensitivity

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      mcbe_version:
        description: 'MCBE version as integer (e.g. 12100 for 1.21.00)'
        required: false
        default: '12100'

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        abi: [ arm64-v8a ]        # MCBE on Android is ARM64 only
        mcbe_version:
          - 12100                 # 1.21.0x  ← default
          # Add more as needed:
          # - 12080               # 1.20.8x
          # - 12070               # 1.20.7x

    env:
      NDK_VERSION: "26.3.11579264"
      API_LEVEL:   "24"           # Android 7.0+  (MCBE minimum)
      MCBE_VER:    ${{ github.event.inputs.mcbe_version || matrix.mcbe_version }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Install Android NDK ───────────────────────────────────────────────
      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      # ── 3. Install CMake ─────────────────────────────────────────────────────
      - name: Install CMake
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      # ── 4. Configure ────────────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ env.API_LEVEL }} \
            -DANDROID_STL=c++_static \
            -DMCBE_VERSION=${{ env.MCBE_VER }} \
            -G Ninja

      # ── 5. Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── 6. Rename & collect artifact ─────────────────────────────────────────
      - name: Collect .so
        run: |
          mkdir -p dist
          cp build/liblib.so dist/PrecisionSensitivity_mcbe${{ env.MCBE_VER }}_${{ matrix.abi }}.so

      # ── 7. Upload build artifact ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrecisionSensitivity_mcbe${{ env.MCBE_VER }}_${{ matrix.abi }}
          path: dist/*.so
          retention-days: 30

  # ── Release job (only on version tags) ───────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/**/*.so
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
